<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
.banner {
  width: 1440px;
  height: 448px;
  background: linear-gradient(135deg, #E8603C 0%, #D14E2F 50%, #B8432A 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.logo-icon {
  width: 80px;
  height: 80px;
  border-radius: 14px;
  margin-right: 20px;
}
.pad { color: #FFFFFF; font-size: 72px; font-weight: 800; }
.magnet { color: #000000; font-size: 72px; font-weight: 800; }
</style>
</head>
<body>
<div class="banner">
  <img src="PM_LOGO_180px180p.png" class="logo-icon" alt="logo">
  <span class="pad">Pad</span><span class="magnet">Magnet</span>
</div>
</body>
</html>
