<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6A55"/>
      <stop offset="100%" stop-color="#E33E2D"/>
    </linearGradient>

    <!-- Pin gradient -->
    <linearGradient id="pinGrad" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0%" stop-color="#FFB199"/>
      <stop offset="55%" stop-color="#FF8C6A"/>
      <stop offset="100%" stop-color="#F06D52"/>
    </linearGradient>

    <!-- Soft shadow (icon content) -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <!-- Inner highlight for magnet -->
    <linearGradient id="magHi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F6F6"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bgGrad)"/>

  <!-- Main mark group with shadow -->
  <g filter="url(#softShadow)">
    <!-- Magnet body: optically balanced horseshoe -->
    <!-- We build as a thick stroked path with rounded caps for brand-grade smoothness -->
    <path d="M 300 440
             C 300 304, 384 220, 512 220
             C 640 220, 724 304, 724 440"
          fill="none"
          stroke="url(#magHi)"
          stroke-width="112"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Magnet crossbar (slightly inset, aligned with arc optical center) -->
    <path d="M 320 520 L 704 520"
          stroke="#FFFFFF"
          stroke-width="54"
          stroke-linecap="round"/>

    <!-- Magnetic force marks (3 per side), tuned for small-size legibility -->
    <g stroke="#FFFFFF" stroke-width="30" stroke-linecap="round">
      <!-- left -->
      <path d="M 250 468 L 196 448"/>
      <path d="M 244 520 L 184 520"/>
      <path d="M 250 572 L 196 592"/>
      <!-- right -->
      <path d="M 774 468 L 828 448"/>
      <path d="M 780 520 L 840 520"/>
      <path d="M 774 572 L 828 592"/>
    </g>

    <!-- Pin: slightly wider shoulders for app-icon recognition -->
    <path d="M 512 884
             C 470 830, 420 764, 380 700
             C 336 630, 312 574, 312 544
             C 312 472, 374 420, 512 420
             C 650 420, 712 472, 712 544
             C 712 574, 688 630, 644 700
             C 604 764, 554 830, 512 884 Z"
          fill="url(#pinGrad)"/>

    <!-- Pin top cut (creates that 'inset' look like your reference) -->
    <path d="M 512 820
             C 482 782, 450 740, 424 698
             C 396 652, 380 614, 380 592
             C 380 540, 430 506, 512 506
             C 594 506, 644 540, 644 592
             C 644 614, 628 652, 600 698
             C 574 740, 542 782, 512 820 Z"
          fill="#FFFFFF" opacity="0.18"/>

    <!-- House (simple, thick, favicon-safe) -->
    <g fill="#FFFFFF">
      <polygon points="512,500 430,568 594,568" />
      <rect x="446" y="568" width="132" height="122" rx="10"/>
    </g>

    <!-- Door / window cut (uses background color for crisp negative space) -->
    <rect x="498" y="618" width="28" height="40" rx="4" fill="#E8603C"/>
  </g>
</svg>
