# Listing Studio — minimal mount + nav-back integrity harness.
#
# Studio cards (Address, Description, Photos, Contact, etc.) are
# SmartCards that default to COLLAPSED — only Address has defaultOpen.
# That makes deep assertions on Photos/Contact field strings unreliable
# because those strings don't render until the user taps to expand the
# card. This flow scopes itself to surfaces that ARE always visible,
# so it can pass deterministically without a complex card-expand
# precursor.
#
# Lock-down list (the things that previously took multiple sessions):
#   - Studio mounts when admin taps "Add Additional Rental Listing"
#   - StudioHeader title "Listing Studio" renders
#   - Address card is open by default (Property Address heading visible)
#   - Back nav returns to My Listings cleanly without app-stack damage
#
# Things this flow does NOT cover (intentional — too much UI gymnastics
# in Maestro for fragile gain):
#   - Upload-from-Desktop instant dialog (Photos card collapsed)
#   - Description textarea sizing (Description card collapsed)
#   - Contact email pre-fill (Contact card collapsed)
# Those are easier to validate by manual S10 tap-through during real
# UX work.

appId: com.padmagnet.app
tags:
  - perf
  - manual
  - studio-mount-regression
---
- launchApp
- runFlow: ../../elements/loadElements.yaml

# 1. Recover from any prior-flow leftover sub-screen by tapping back a
#    couple times (optional taps so the no-op case doesn't fail).
- tapOn:
    id: back-button
    optional: true
- tapOn:
    id: back-button
    optional: true
- waitForAnimationToEnd

# 2. Land on Listings tab.
- tapOn: "Listings"
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 6000

# 3. Open Studio via the "Add Additional" button (visible only when
#    the user already has an active listing, which info@floridapm.net
#    does — 8362 SE Magnolia). Fallback path uses the empty-state CTA.
- tapOn:
    text: "Add Additional"
    optional: true
- tapOn:
    text: "Create Your First Listing"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
      text: "Listing Studio"
    timeout: 6000

# 4. Address card is always open by default — verify the heading is
#    visible. This is the simplest "studio mounted with content" probe.
- assertVisible: "Property Address"

# 5. Back out cleanly. If a confirmation dialog catches us (unsaved
#    draft prompt), the optional tap clears it.
- tapOn:
    id: back-button
- tapOn:
    text: "Discard"
    optional: true
- tapOn:
    text: "Yes"
    optional: true
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 6000
