# Nearby Rentals fly-in card — formatting + scroll regression harness.
#
# Locks down the 2026-04-24 layout pass (4-line comp cards, bounded
# scrollable grid, pan-to-dismiss threshold). Run before shipping any
# change to NearbyRentalsCard.js, ManilaCard.js, or the nearby-rentals
# API route / RPC.
#
# Prereqs:
#   - Signed in as info@floridapm.net.
#   - At least one active listing in a Martin-County area so the 7 mi
#     radius returns >=4 comps (enough to exercise the scroll path).
#
# Coverage:
#   - Card opens with manila "NEARBY RENTALS" tab label visible.
#   - Header copy renders ("These are advertised rentals offering similar features").
#   - Radius chips render (2/5/7/10 mi).
#   - Summary line shows "N listings within N mi" + price range.
#   - Comp card 4-line layout intact: price, street, city+zip, bd/ba/sqft.
#   - Swipe-up scroll inside the grid works — listings beyond the initial
#     viewport become visible.
#   - Swipe-down dismiss still works from the header area.
#
# NOTE: the card is reached via the Listing card's "Nearby Active Rentals"
# CTA, not from Listing Studio. This flow exercises the same component from
# the real user path.

appId: com.padmagnet.app
tags:
  - perf
  - manual
  - nearby-rentals-regression
---
- runFlow: ../../elements/loadElements.yaml

# 1. Navigate to Listings tab.
- tapOn:
    id: back-button
    optional: true
- tapOn:
    text: "Listings"
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 6000

# 2. Open Nearby Active Rentals.
- tapOn: "Nearby Active Rentals"

# 3. Manila tab label + header copy.
- extendedWaitUntil:
    visible:
      text: "NEARBY RENTALS"
    timeout: 6000
- assertVisible: "These are advertised rentals offering similar features"

# 4. Radius chips render.
- assertVisible: "Radius"
- assertVisible: "2 mi"
- assertVisible: "5 mi"
- assertVisible: "7 mi"
- assertVisible: "10 mi"

# 5. Summary line — match the "listings within N mi" string.
- extendedWaitUntil:
    visible:
      text: "listings within"
    timeout: 6000

# 6. Comp card 4-line layout. Each line has a distinct font/color but
#    Maestro can only match text — we assert representative strings:
#      - "/mo" proves the price line rendered
#      - "sqft" proves the bd/ba/sqft line rendered
#      - "FL" proves the city+state/zip line rendered (Florida suffix)
- assertVisible:
    text: "/mo"
- assertVisible:
    text: "sqft"
# City+zip line. "FL" or a 5-digit zip covers this but FL is more
# deterministic given our South-Florida-only MLS scope.
- assertVisible:
    text: ".*FL.*"

# 7. Scroll the grid — swipe up from the middle of the card to reveal
#    later rows. If the grid isn't bounded, this swipe either dismisses
#    the card (previous bug) or does nothing. We then assert that "mi"
#    distance badges are still visible (grid kept rendering, not dead).
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: ".*mi"
    timeout: 3000

# 8. Dismiss via downward pull from the header area (top 20% of screen).
#    The `start`/`end` coords target the manila tab region, not the grid.
- swipe:
    start: "50%, 20%"
    end: "50%, 85%"
    duration: 400
- waitForAnimationToEnd:
    timeout: 3000

# 9. Back on the Listings tab — the fly-in should be gone, listing rows
#    visible again.
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 4000
- assertNotVisible: "NEARBY RENTALS"
