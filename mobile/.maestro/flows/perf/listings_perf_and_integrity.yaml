# Listings tab — performance + row integrity regression harness.
#
# Locks down the Listings tab behaviour after the 2026-04-24 perf pass
# (memoized OwnerListingRow, cleaned-up AnimatedBarChart loops, stable
# callbacks, stale-while-revalidate cache seed). Run this before shipping
# any change to app/(owner)/listings.js or lib/listingCache.js.
#
# Prereqs:
#   - Signed in as info@floridapm.net (has >=1 active listing).
#   - If not signed in, run smoke/owner_l1_autodismiss.yaml first.
#
# What it covers:
#   - Listings tab renders at least one card (memo didn't break layout).
#   - Hero overlay shows the price string ($xxx/mo) over the photo.
#   - Status pill, Views/Contacts counters and action grid all render.
#   - Tier badge visible when tier != free (Premium).
#   - Nearby Active Rentals CTA renders AnimatedBarChart without a crash.
#   - Tapping Nearby routes into the full Nearby Rentals screen.
#   - Tapping Edit Listing still hydrates cache-hit fast (<5s to Property
#     Details).
#   - Adjust Price modal opens and dismisses cleanly.
#   - Leaving the tab and returning renders instantly from cache (no
#     ActivityIndicator reappears if cache is warm).

appId: com.padmagnet.app
tags:
  - perf
  - manual
  - listings-regression
---
- launchApp:
    stopApp: true   # cold launch — fresh nav stack, preserved auth state
- runFlow: ../../elements/loadElements.yaml

# 1. Wait for cold-launch routing to settle (auth check + role gate + land
#    on the default owner tab, typically Home for info@floridapm.net).
- waitForAnimationToEnd:
    timeout: 8000

# 2. Go to Listings tab.
- tapOn:
    text: "Listings"
- waitForAnimationToEnd:
    timeout: 4000

# 3. My Listings header present.
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 6000

# 4. At least one listing row renders — assert hero overlay price string.
#    (Regex matches "$x,xxx/mo" — survives price edits without brittle lock.)
- extendedWaitUntil:
    visible:
      text: ".*/mo"
    timeout: 6000

# 5. Status + counters + action grid. If the memo wrap broke prop flow, one
#    of these would disappear.
- assertVisible: "Views"
- assertVisible: "Contacts"
- assertVisible: "View Listing"
- assertVisible: "Edit Listing"
- assertVisible: "Adjust Price"
- assertVisible: "De-List"

# 6. Nearby Active Rentals CTA — this is where AnimatedBarChart mounts.
#    If the animated SVG crashed on mount the whole row would fail to paint.
- assertVisible: "Nearby Active Rentals"
- assertVisible: "Compare local rent rates and competitive property features!"

# 7. Tap Adjust Price — confirm modal mounts and the onEditPrice callback
#    still delivers the listing object (not the id).
- tapOn: "Adjust Price"
- extendedWaitUntil:
    visible:
      text: "Edit My Price"
    timeout: 3000
- tapOn:
    text: "Cancel"
- waitForAnimationToEnd

# 8. Tap Nearby Active Rentals — confirm it still routes (not a broken
#    inline closure after the callback refactor). The destination screen
#    always shows a "Now Showing:" banner once coords resolve, or a
#    "Search Radius" filter section below that.
- tapOn: "Nearby Active Rentals"
- extendedWaitUntil:
    visible:
      text: "Search Radius"
    timeout: 8000
- tapOn:
    id: back-button
- waitForAnimationToEnd

# 9. Cache-hit edit path — must still open quickly after the perf pass.
- tapOn: "Edit Listing"
- extendedWaitUntil:
    visible:
      text: "Property Details"
    timeout: 5000

# 10. Back out to Listings and confirm the list is still there (state
#     preserved via cache, no reload spinner). The cache-hit path itself
#     is proven by flow `edit_listing_open_time.yaml`'s sub-5s assertion
#     on Property Details — no need to re-test it here by tabbing away.
- tapOn:
    id: back-button
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 4000
- assertVisible:
    text: ".*/mo"
