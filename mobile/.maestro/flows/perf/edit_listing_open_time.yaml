# Perf regression: Edit Listing open time.
#
# After signing in as an owner with ≥1 existing listing, taps "Edit Listing"
# from the My Listings card and asserts the edit form is usable. Designed as
# a regression harness for the listing-cache hydration path — a cache hit
# should render the form synchronously on first paint, so even the slow
# assertions below (3s / 5s) should comfortably pass.
#
# To observe the exact hydration timings, tail Metro during the run:
#   grep for lines like:
#     [EDIT_TIMING] mount cache_hit=true elapsed=1ms
#     [EDIT_TIMING] fetch_complete cache_hit=true fetch_ms=… total_ms=…
#
# Cache-hit target: mount line shows cache_hit=true AND elapsed < 50ms.
# Cache-miss baseline: total_ms shows full GET round-trip (2-4s on Hobby).
#
# Prereqs in .env.local:
#   MAESTRO_OWNER_TEST_EMAIL=info@floridapm.net
#   MAESTRO_OWNER_TEST_PASSWORD=<set locally>
# And the owner account must already own at least one active/pending listing.
#
# Run via:
#   cd mobile/.maestro && ./run.sh flows/perf/edit_listing_open_time.yaml

appId: com.padmagnet.app
tags:
  - perf
---
- runFlow: ../../elements/loadElements.yaml

# 1. Cold-start the app to a known baseline
- runFlow: ../_shared/launch_fresh.yaml
- tapOn:
    text: "Not now"
    optional: true
- waitForAnimationToEnd

# 2. Role gate → owner path
- runFlow: ../_shared/choose_owner.yaml
- waitForAnimationToEnd:
    timeout: 8000

# 3. If not already signed in, go through L1 → sign-in sheet
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd
- tapOn:
    id: ${output.auth.manilaL1.primaryCta}
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: ${output.auth.bottomSheet.emailInput}
- tapOn:
    id: ${output.auth.bottomSheet.emailInput}
- inputText: ${MAESTRO_OWNER_TEST_EMAIL}
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: ${output.auth.bottomSheet.passwordInput}
- inputText: ${MAESTRO_OWNER_TEST_PASSWORD}
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: ${output.auth.bottomSheet.signInCta}
- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Not now"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000

# 4. Land on My Listings. Fetch warms the listing cache for subsequent taps.
- assertVisible: "My Listings"
- waitForAnimationToEnd:
    timeout: 6000

# 5. Tap "Edit Listing" on the first card. Cache hit should hydrate the form
#    synchronously — "Monthly Rent" input should appear within a short window
#    bounded only by navigation animation + first paint.
- tapOn: "Edit Listing"

# Soft upper bound: Edit screen header shows up (navigation animation done)
- assertVisible:
    text: "Edit Listing"
    timeout: 3000

# Form interactivity: the Monthly Rent input label must be present, proving
# the form hydrated. On cache hit this is essentially instant.
- assertVisible:
    text: "Monthly Rent"
    timeout: 5000

# 6. Tap Photos tab — exercises the lazy DraggableFlatList require path.
#    The tab label itself is rendered by the Details tab already so we wait
#    for a Photos-tab-specific affordance.
- tapOn:
    text: "Photos"
- assertVisible:
    text: "Add Photos from Phone"
    timeout: 5000

# 7. Back out — confirms navigation stack is healthy
- tapOn:
    id: back-button
- assertVisible: "My Listings"
