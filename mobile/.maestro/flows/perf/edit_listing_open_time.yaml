# Perf harness: Edit Listing open time.
#
# Assumes the app is already signed in as info@floridapm.net and on any owner
# tab. If not signed in, run owner_l1_autodismiss.yaml first (or sign in
# manually), then invoke this flow.
#
# Validates:
#   - Listings tab loads and renders at least one listing card
#   - Tapping Edit Listing hydrates the form within 5s (cache hit path)
#   - Photos tab loads and renders its action bar within 5s
#
# To observe exact timings, tail Metro during the run and grep for:
#   [EDIT_TIMING] mount cache_hit=true elapsed=…
#   [EDIT_TIMING] fetch_complete cache_hit=true fetch_ms=… total_ms=…
#
# Cache-hit target: mount shows cache_hit=true AND elapsed < 50ms.
#
# Run via:
#   cd mobile/.maestro && ./run.sh flows/perf/edit_listing_open_time.yaml

appId: com.padmagnet.app
tags:
  - perf
  - manual
---
- runFlow: ../../elements/loadElements.yaml

# 1. Back out of any nested screen (e.g. Edit Listing from a prior run) so
#    the bottom tab bar is visible. Optional taps so we no-op when the tab
#    bar is already showing.
- tapOn:
    id: back-button
    optional: true
- waitForAnimationToEnd

# 2. Go to the Listings tab. Works from any owner tab.
- tapOn:
    text: "Listings"
- waitForAnimationToEnd:
    timeout: 4000

# 2. Confirm we're on the Listings tab. "Edit Listing" only appears on the
#    listing-card actions (not on the Home tab preview cards).
- extendedWaitUntil:
    visible:
      text: "Edit Listing"
    timeout: 6000

# 3. Tap Edit Listing on the first card — cache hit = instant hydrate.
- tapOn: "Edit Listing"

# 4. Form interactivity: Monthly Rent input label must appear fast.
- extendedWaitUntil:
    visible:
      text: "Property Details"
    timeout: 5000

# 5. Photos tab — exercises lazy DraggableFlatList require path.
- tapOn:
    text: "Photos"
- extendedWaitUntil:
    visible:
      text: "Add Photos from Phone"
    timeout: 5000

# 6. Back out — sanity check nav stack is healthy.
- tapOn:
    id: back-button
- extendedWaitUntil:
    visible:
      text: "Edit Listing"
    timeout: 4000
