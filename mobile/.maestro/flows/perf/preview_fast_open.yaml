# Preview-as-Renter — fast-open regression harness.
#
# Locks down the 2026-04-24 perf pass on app/owner/preview.js:
#   - Cache-seed render (no ActivityIndicator) via listingCache hit
#   - display-fields prefetch from _layout.js eliminates the second wave
#   - "Preview as Tenant" → "Preview as Renter" copy unification
#
# Prereqs:
#   - Signed in as info@floridapm.net with >=1 active listing.
#   - Listings tab visited during this session so listingCache is warm.
#
# Run AFTER listings_perf_and_integrity.yaml (which implicitly warms the
# cache). If run standalone, the cold path applies and timings relax.

appId: com.padmagnet.app
tags:
  - perf
  - manual
  - preview-regression
---
- launchApp:
    stopApp: true
- runFlow: ../../elements/loadElements.yaml

# 1. Wait for cold-launch routing, then go to Listings (also warms
#    listingCache via the tab's fetch).
- waitForAnimationToEnd:
    timeout: 8000
- tapOn: "Listings"
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 6000

# 2. Tap View Listing — with a warm cache, Preview should paint full
#    content within ~1s. We give 2.5s headroom for cold display-fields
#    fetch on very first session.
- tapOn: "View Listing"
- extendedWaitUntil:
    visible:
      text: "Preview as Renter"
    timeout: 2500

# 3. Copy unification — "Renter" not "Tenant".
- assertVisible: "This is how renters will see your listing"
- assertNotVisible: "Preview as Tenant"
- assertNotVisible: "This is how tenants will see your listing"

# 4. Hero content visible (price/mo string over photo).
- assertVisible:
    text: ".*/mo"

# 5. Body content arrival. The hero (price + address) renders
#    unconditionally, so it's a weak signal. We need something gated
#    on display-fields hydration. "Read more" appears only when
#    public_remarks is present AND ListingInfo's CollapsibleText
#    rendered (config-driven). The owner Tioga listing has a real
#    description, so this is a stable "second wave is here" probe.
#    "Contact" section was tried first but it's filtered out for
#    listings without contact_instructions — too brittle.
- extendedWaitUntil:
    visible:
      text: "Read more"
    timeout: 4000

# 6. Back out cleanly.
- tapOn:
    id: back-button
- extendedWaitUntil:
    visible:
      text: "My Listings"
    timeout: 4000
