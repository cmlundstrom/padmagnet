# Smoke: renter first-time onboarding interposition.
#
# Verifies the new post-auth gate that captures display_name (required) +
# phone (optional) before a freshly-signed-in renter can resume the app.
#
# What it proves end-to-end:
#   1. The handle_new_user trigger (migration 076) leaves display_name=NULL
#      for email signups with no explicit display_name in user_metadata.
#   2. resolvePostLoginDestination sees the NULL and routes the user to
#      /settings/edit-profile?firstTime=true&next=<intended>.
#   3. Edit Profile renders in firstTime mode: "Last Step" header, no
#      close X, hardware back blocked.
#   4. Save with empty name is rejected with the "Missing Name" alert.
#   5. The phone info-icon opens the "Why share your phone?" tooltip,
#      which dismisses cleanly with "Got it".
#   6. After filling display_name + Save, the user is routed to the
#      original intended destination (the renter swipe deck).
#
# Precondition:
#   - App is running on the dev client connected to Metro.
#   - App is at the welcome splash (sign out manually first if needed).
#
# Cleanup:
#   - The seeded user is hard-deleted at end of flow (auth.users + profile).
#
# Last verified: 2026-04-26 against dev client on S10 (RF8R51L94GR).
appId: com.padmagnet.app
---

# 1. Seed a fresh test renter via Supabase Admin. user_metadata only
#    carries role; no display_name. With migration 076 in place the trigger
#    inserts profile with display_name=NULL — so the firstTime interposition
#    fires post-signin. Use seed_noname_test_renter.js (NOT the standard
#    seed_test_renter.js, which sets display_name='Maestro Renter' for
#    smokes that DON'T want the firstTime gate).
- runScript: ../../helpers/seed_noname_test_renter.js

# 2. Cold launch — preserves Metro URL on dev client.
#    PRE-REQUISITE: caller must wipe app state + re-bind the dev client
#    to the Metro URL before invoking this flow. The dev_client_reconnect
#    helper's auto-discover is unreliable on this network. Use the wrapper
#    `flows/smoke/run_renter_onboarding.sh` which does the adb dance
#    before invoking maestro.
- launchApp:
    stopApp: true
- waitForAnimationToEnd:
    timeout: 6000
- assertVisible: "PadMagnet"

# 3. Swipe twice to bring the bottom Sign In link well above the fold,
#    then tap it. The WelcomeHero's horizontal FlatList confuses a
#    single scroll, so manual swipes in the lower (non-FlatList) area
#    are the reliable lever.
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "welcome-signin-link"
- waitForAnimationToEnd:
    timeout: 4000

# 4. Confirm email screen rendered (landmark) before any input — gives the
#    dev client time to settle any lazy-loaded modules. Without this assert
#    a fast inputText() can race the screen mount and trigger a JSI race
#    where expo-modules-core's globalThis.expo.EventEmitter is undefined.
- assertVisible: "Use Magic Link with Email"

# 5. Tap the email field explicitly to focus it, then type. Untargeted
#    inputText relies on the OS reporting a focused field which is not
#    guaranteed at this point in the dev client. After typing we MUST
#    hide the keyboard — it covers the "Continue with Email" button on
#    smaller phones (S10) and a tap-on-text would otherwise land in
#    dead space behind the IME.
- tapOn: "you@example.com"
- inputText: ${output.seed.renter.email}
- hideKeyboard
- tapOn: "Continue with Email"
- waitForAnimationToEnd:
    timeout: 4000

# 6. Password screen — tap field, type, hide keyboard, sign in
- tapOn: "Enter your password"
- inputText: ${output.seed.renter.password}
- hideKeyboard
- tapOn: "Sign In"
- waitForAnimationToEnd:
    timeout: 8000

# 7. Should land on Edit Profile in firstTime mode
# "Last Step" header is a clean single Text that always exposes to a11y.
# The subtitle and "Display Name <*>" use nested-Text composition which
# doesn't expose reliably on Android RN, so we don't assert on them —
# the testID-based field interactions below prove the screen is real.
- assertVisible: "Last Step"

# 8. Save with empty name should be rejected
- tapOn:
    id: "edit-profile-save-bottom"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Missing Name"
- tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 1500

# 9. Phone tooltip — info icon opens modal with bullets. The tooltip
#    title "Why share your phone?" is bundled into a single composite
#    content-desc with all the bullet text, so we can't isolate it.
#    "Got it" exposes as its own a11y node and is sufficient proof the
#    modal opened (it doesn't exist anywhere else on this screen).
- tapOn:
    id: "edit-profile-phone-info"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Got it"
- tapOn: "Got it"
- waitForAnimationToEnd:
    timeout: 1500

# 10. Fill in display_name and save. Must hide keyboard before tapping
#     Save Changes — the keyboard covers the bottom button on the S10.
- tapOn:
    id: "edit-profile-name-input"
- inputText: "Test Renter"
- hideKeyboard
- tapOn:
    id: "edit-profile-save-bottom"
- waitForAnimationToEnd:
    timeout: 4000

# 11. Success alert + OK to dismiss → routes to swipe deck
- assertVisible: "Saved"
- tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 6000

# 12. Confirm we landed in the renter tab nav (Profile tab is always present)
- assertVisible: "Profile"

# 13. Cleanup — hard-delete the seeded user via auth admin API
- runScript: ../../helpers/cleanup_test_users.js
