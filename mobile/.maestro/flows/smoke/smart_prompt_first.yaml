# Smoke: Smart Prompt Card #1 (budget) appears after 3 anon swipes,
# is answerable, and dismisses cleanly.
#
# Targets the FIRST prompt only (`budget` @ afterSwipe=3) — enough to
# prove the SMART_PROMPTS / SmartPromptCard wiring is intact end-to-end
# without needing 60 swipes + GPS permissions for the location prompt.
# Future smokes can extend coverage to other prompt keys (pets/8,
# beds/15, type/40, features/60). location/25 needs GPS so likely
# stays manual.
#
# Why anon (no auth): the swipe count + prompt logic in
# `mobile/app/(tenant)/swipe.js` runs identically for anon and authed
# sessions. Anon is simpler (no seed needed) and exercises the
# pre-auth path that most real users hit first.
#
# What this proves end-to-end:
#   1. testID `swipe-deck-like-button` exists + each tap advances the
#      deck by one swipe (count tick).
#   2. After exactly 3 swipes, modal `smart-prompt-card-budget` mounts.
#   3. Each option button has a discoverable testID
#      (`smart-prompt-option-budget-{i}`) so a future preference
#      extraction smoke can stitch in here.
#   4. Tapping an option dismisses the modal (no longer visible).
#
# Precondition:
#   - Use the wrapper run_smart_prompt_first.sh (pm-clear + dev-client
#     rebind). No user seeding required (anon path).
#   - The dev environment must have at least 3 listings in the swipe
#     deck. info@floridapm.net's listing satisfies this.
#
# First written: 2026-05-04 against dev client on S10.
appId: com.padmagnet.app
---

# 1. Cold launch.
- launchApp:
    stopApp: true
- waitForAnimationToEnd:
    timeout: 6000

# 1a. Fallback for the dev-menu Continue dialog.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 4000

- assertVisible: "PadMagnet"

# 2. Anon renter → swipe deck.
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- runFlow: ../_shared/choose_renter.yaml
- waitForAnimationToEnd:
    timeout: 8000

# 3. Confirm we're on the swipe deck. The like button is the canonical
#    interaction target — present as long as a card is loaded.
- assertVisible:
    id: "swipe-deck-like-button"

# 4. Swipe right 3 times. Each tap advances the deck + ticks
#    swipeCount by 1. After the 3rd, SMART_PROMPTS finds budget
#    (afterSwipe===3) and the modal mounts.
#
#    Important: a small wait between taps lets the deck animation
#    settle before the next tap registers. Without it the 2nd/3rd
#    tap can land on the swipe-out animation and miss.
- tapOn:
    id: "swipe-deck-like-button"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "swipe-deck-like-button"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "swipe-deck-like-button"
- waitForAnimationToEnd:
    timeout: 4000

# 5. Budget prompt should now be visible. The card root has the
#    testID we just wired (smart-prompt-card-budget); each option
#    has smart-prompt-option-budget-{0..4}.
- assertVisible:
    id: "smart-prompt-card-budget"
- assertVisible:
    id: "smart-prompt-option-budget-1"

# 6. Tap an option ($2,000 — index 1) to answer + dismiss.
- tapOn:
    id: "smart-prompt-option-budget-1"
- waitForAnimationToEnd:
    timeout: 2000

# 7. Modal must be gone (proves the answer dismissed cleanly).
#    NOT asserting that swipe-deck-like-button is visible afterward —
#    answering the budget prompt awards 15 PadPoints which can trigger
#    a level-up overlay that briefly covers the deck. The feature
#    being tested (prompt mounts + answers + dismisses) is already
#    fully proven by the four assertions above; an additional
#    "deck visible again" check is redundant + flaky.
- assertNotVisible:
    id: "smart-prompt-card-budget"
