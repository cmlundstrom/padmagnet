# Smoke: Owner L1 password flow — implicit signin-first + JIT signup CTA.
#
# Mirrors auth_l1_signin_signup_split.yaml but for the owner role. The L1
# AuthBottomSheet is shared between owner and renter contexts; this smoke
# proves the JIT signup path works end-to-end when the entry point is the
# OWNER manila L1 card (context='create_listing'), not the renter
# Messages tab.
#
# What this smoke proves end-to-end:
#   1. Anon owner home L1 manila card → tap manila-l1-primary-cta opens
#      the AuthBottomSheet with create_listing context
#   2. Mode toggle MUST NOT be present (auth-sheet-mode-toggle removed)
#   3. OAuth buttons MUST NOT be present (Google/Facebook hidden)
#   4. Continue with a never-registered email triggers the
#      UnlockAccountModal (NOT the old system "Couldn't sign you in"
#      alert)
#   5. Tapping unlock-account-create runs signUp with role='owner' from
#      deriveRoleIntent (since context='create_listing' is in
#      OWNER_INTENT_CONTEXTS) and the sheet transitions to the sentBox
#      panel (auth-sheet-sent-box)
#   6. Supabase auth actually creates the user (verified via REST lookup)
#
# Precondition:
#   - Use the wrapper script run_owner_l1_signup_jit_cta.sh which wipes
#     app data + re-binds the dev client to Metro before invoking
#     maestro.
#
# Cleanup:
#   - The created sign-up email is hard-deleted via Supabase admin.
#
# First written: 2026-05-03 against dev client on S10.
appId: com.padmagnet.app
---

# 1. Generate a unique fresh email for the create-account flow. Stored
#    in output.signupEmail so cleanup at the end can find + delete it.
- runScript: ../../helpers/seed_signup_email.js

# 2. Cold launch — wrapper has wiped app data + re-bound the dev client.
- launchApp:
    stopApp: true
- waitForAnimationToEnd:
    timeout: 6000

# 2a. Fallback for the dev-menu Continue dialog if the wrapper missed.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 4000

- assertVisible: "PadMagnet"

# 3. Anon owner → owner home (manila card visible).
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- runFlow: ../_shared/choose_owner.yaml
- waitForAnimationToEnd:
    timeout: 8000

# 4. L1 manila card → tap primary CTA → AuthBottomSheet opens with
#    create_listing context.
- assertVisible: "List Your Rental\nfor Free"
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd
- assertVisible:
    id: "manila-l1-primary-cta"
- tapOn:
    id: "manila-l1-primary-cta"
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: "auth-sheet-sign-in-cta"

# ────────────────────────────────────────────────────────────────────
# Structural assertions: toggle + OAuth removed (same as renter version)
# ────────────────────────────────────────────────────────────────────

- assertNotVisible:
    id: "auth-sheet-mode-toggle"
- assertNotVisible: "Continue with Google"
- assertNotVisible: "Continue with Facebook"

# ────────────────────────────────────────────────────────────────────
# JIT signup path: signIn fails → UnlockAccountModal → tap Create
# new account → signUp runs → sentBox panel takes over the sheet.
# ────────────────────────────────────────────────────────────────────

# 5. Type the seeded credentials.
- tapOn:
    id: "auth-sheet-email-input"
- inputText: ${output.signupEmail.email}
- hideKeyboard
- tapOn:
    id: "auth-sheet-password-input"
- inputText: ${output.signupEmail.password}
- hideKeyboard

# 6. Tap Continue → signIn fails (no account yet) → JIT modal.
- tapOn:
    id: "auth-sheet-sign-in-cta"
- waitForAnimationToEnd:
    timeout: 4000

# 7. UnlockAccountModal must show.
- assertVisible: "Unlock Your Search"
- assertVisible:
    id: "unlock-account-create"
- assertVisible:
    id: "unlock-account-try-again"

# 8. Tap the primary CTA → runSignUp fires with role='owner' metadata.
- tapOn:
    id: "unlock-account-create"
- waitForAnimationToEnd:
    timeout: 8000

# 9. The sheet must transition into the sentBox panel — proves
#    signUp succeeded with confirmation-pending AND the sheet stayed
#    mounted (so the relay subscription is alive).
- assertVisible:
    id: "auth-sheet-sent-box"
- assertVisible: "Check your email"

# 10. Verify the user actually exists in Supabase auth (proves signUp
#     wasn't a no-op).
- runScript: ../../helpers/verify_signup_user_exists.js

# 11. Cleanup — delete the created auth user so the email is reusable.
- runScript: ../../helpers/cleanup_signup_email.js
