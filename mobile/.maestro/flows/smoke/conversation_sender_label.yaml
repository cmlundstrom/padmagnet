# Smoke: conversation sender label renders with the "name (Role)" split
# format from the renter's perspective on an internal-owner conversation.
#
# Code under test (high-churn — 3 revisions in one week around Apr 8-10):
#   - components/messaging/MessageBubble.js:49-56   (split Text styling)
#   - app/conversation/[id].js:471-482               (perspective-aware label)
#
# Expected on renter's view of an incoming owner message:
#   testID `conversation-sender-label` contains both "{ownerDisplayName}"
#   and "(Owner)" substrings, rendered with distinct styles.
#
# This flow seeds a renter + owner + conversation + 2 messages, signs the
# renter in via the standard Contact Owner auth path (same as anon_upgrade),
# then deep-links into /conversation/<id> to skip the Messages list UI.
#
# Run via:
#   cd mobile/.maestro && ./run.sh flows/smoke/conversation_sender_label.yaml
appId: com.padmagnet.app
---
- runFlow: ../../elements/loadElements.yaml

# 1. Seed renter + owner + conversation + messages (before launching app
#    so the authed session sees the pre-existing thread).
- runScript: ../../helpers/seed_test_renter.js
- runScript: ../../helpers/seed_test_owner.js
- runScript: ../../helpers/seed_test_conversation.js

# 2. Cold start → renter (anon) → swipe deck
- runFlow: ../_shared/launch_fresh.yaml
- runFlow: ../_shared/choose_renter.yaml
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    id: ${output.listings.swipeDeck.container}

# 3. Open auth sheet via Contact Owner → sign in as seeded renter
- tapOn:
    id: ${output.listings.swipeDeck.card}
    index: 0
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: ${output.listings.detail.contactOwner}
- tapOn:
    id: ${output.listings.detail.contactOwner}
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: ${output.auth.bottomSheet.emailInput}
- tapOn:
    id: ${output.auth.bottomSheet.emailInput}
- inputText: ${output.seed.renter.email}
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: ${output.auth.bottomSheet.passwordInput}
- inputText: ${output.seed.renter.password}
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: ${output.auth.bottomSheet.signInCta}
- waitForAnimationToEnd:
    timeout: 12000
- tapOn:
    text: "Not now"
    optional: true
- waitForAnimationToEnd

# 4. Deep-link straight into the seeded conversation — faster + more
#    deterministic than driving through the Messages list UI.
- openLink: ${output.seed.conversation.deepLink}
- waitForAnimationToEnd:
    timeout: 6000

# 5. The owner's message bubble must render the split sender label.
#    Important Android quirk: React Native flattens nested <Text> nodes
#    into a single accessibility node, so the inner Text's testID is
#    invisible to Maestro — but the full string "{name} (Role)" lives on
#    the outer testID. The visual split (different colors/weights) is
#    preserved at render time but not in the a11y tree.
#
#    We assert:
#      (a) the outer testID exists (label rendered)
#      (b) the name half is present (`maestro-owner-...`)
#      (c) the role half is present (`(Owner)` parenthetical)
#    Maestro regex is anchored — substring matches need explicit `.*`.
- assertVisible:
    id: conversation-sender-label
- assertVisible: "maestro-owner-.*"
- assertVisible: ".*\\(Owner\\).*"

# 6. Negative control: the renter's own outbound bubble must NOT have a
#    sender label. Because sender labels only render when !isMine, seeding
#    a "(Renter)" testID would mean the mine-detection is broken.
#    We assert the renter's own display_name text is NOT used as a label —
#    if it WERE, we'd see two occurrences of the name on screen.
#    (Outbound bubble body is "Yes, Thursday at 4pm works for me." — it's
#    visible but the sender-label wrapper Text should only exist once.)

# 7. Cleanup — deletes conversation, then users (FK order matters).
- runScript: ../../helpers/cleanup_test_users.js
