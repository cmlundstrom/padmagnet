# Smoke test: password eyeball toggle on AuthBottomSheet.
# Verifies the eyeball icon (added Apr 13) is wired up, tappable, and doesn't
# crash on toggle. Visual reveal/mask state requires manual eyes — this is a
# smoke gate against the eyeball getting unwired in a future change.
#
# autoCapitalize="none" is NOT covered here: Maestro's inputText bypasses the
# system keyboard, so autoCapitalize behavior cannot be triggered or asserted.
# Verified statically via `grep autoCapitalize` in the source instead.
appId: com.padmagnet.app
---

- runFlow: ../../elements/loadElements.yaml
- runFlow: ../_shared/launch_fresh.yaml
- runFlow: ../_shared/choose_renter.yaml
- waitForAnimationToEnd:
    timeout: 8000

# Get to AuthBottomSheet via the renter Contact Owner flow
- assertVisible:
    id: ${output.listings.swipeDeck.container}
- tapOn:
    id: ${output.listings.swipeDeck.card}
    index: 0
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: ${output.listings.detail.contactOwner}
- tapOn:
    id: ${output.listings.detail.contactOwner}
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: ${output.auth.bottomSheet.emailInput}

# Type something into the password field so the eyeball has state to toggle
- tapOn:
    id: ${output.auth.bottomSheet.passwordInput}
- inputText: "EyeballSmoke123"
- hideKeyboard
- waitForAnimationToEnd

# Eyeball must be visible and tappable
- assertVisible:
    id: ${output.auth.bottomSheet.eyeToggle}
- tapOn:
    id: ${output.auth.bottomSheet.eyeToggle}
- waitForAnimationToEnd
# Toggle back
- tapOn:
    id: ${output.auth.bottomSheet.eyeToggle}
- waitForAnimationToEnd

# Sheet still mounted, password field still present — no crash
- assertVisible:
    id: ${output.auth.bottomSheet.passwordInput}
