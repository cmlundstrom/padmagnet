# Smoke: L1 password flow — implicit signin-first + JIT signup CTA.
#
# This file replaced the prior toggle-based smoke when the L1 sheet was
# rebuilt 2026-04-27 to drop the signin/signup mode toggle entirely.
# The new flow:
#   1. User types email + password, taps Continue
#   2. App calls signIn(email, password) first
#   3a. Success → routeAfterSignIn → resolver → done
#   3b. Invalid login → 2-button alert: "Try again" | "Create new account"
#   3c. Email not confirmed → real supabase.auth.resend() + honest alert
#   4. User taps "Create new account" → runSignUp() → sheet transitions
#      into the sentBox panel (testID auth-sheet-sent-box) with mode-aware
#      "Check your email" copy. Sheet stays mounted so the relay
#      subscription survives the user's email-link tap.
#
# What this smoke proves end-to-end:
#   1. No mode toggle in the L1 sheet (auth-sheet-mode-toggle gone)
#   2. No OAuth buttons in the L1 sheet (Google/Facebook/Apple hidden)
#   3. Continue with a never-registered email triggers the
#      "Couldn't sign you in" alert with the JIT signup CTA visible
#   4. Tapping "Create new account" in the alert calls signUp and the
#      sheet transitions into the sentBox panel (auth-sheet-sent-box)
#   5. Supabase auth actually creates the user (verified via REST lookup)
#
# Precondition:
#   - Use the wrapper script run_l1_signin_signup_split.sh which wipes
#     app data + re-binds the dev client to Metro before invoking
#     maestro. Bare `bash run.sh` will fail on auth state from any
#     prior smoke.
#
# Cleanup:
#   - The created sign-up email is hard-deleted via Supabase admin
#
# Last verified: 2026-04-27 against dev client on S10 (RF8R51L94GR).
appId: com.padmagnet.app
---

# 1. Generate a unique fresh email for the create-account flow. Stored
#    in output.signupEmail so cleanup at the end can find + delete it.
- runScript: ../../helpers/seed_signup_email.js

# 2. Cold launch — wrapper has wiped app data + re-bound the dev client.
- launchApp:
    stopApp: true
- waitForAnimationToEnd:
    timeout: 6000

# 2a. Fallback for the dev-menu Continue dialog if the wrapper missed.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 4000

- assertVisible: "PadMagnet"

# 3. Anon renter → swipe deck.
- swipe:
    start: 50%, 75%
    end: 50%, 25%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1000
- runFlow: ../_shared/choose_renter.yaml
- waitForAnimationToEnd:
    timeout: 6000

# 4. Messages tab → L1 sheet for anon session.
- tapOn: "Messages"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "auth-sheet-sign-in-cta"

# ────────────────────────────────────────────────────────────────────
# Structural assertions: toggle + OAuth removed
# ────────────────────────────────────────────────────────────────────

# 5. Mode toggle MUST NOT be present anymore (was auth-sheet-mode-toggle).
#    If this assertion fails, someone reintroduced the toggle.
- assertNotVisible:
    id: "auth-sheet-mode-toggle"

# 6. OAuth buttons MUST NOT be present (Google/Facebook/Apple hidden
#    until post-launch wiring). Asserting on label text since those
#    buttons don't have testIDs today.
- assertNotVisible: "Continue with Google"
- assertNotVisible: "Continue with Facebook"

# ────────────────────────────────────────────────────────────────────
# JIT signup path: signIn fails → alert → tap Create new account →
# signUp runs → sentBox panel takes over the sheet
# ────────────────────────────────────────────────────────────────────

# 7. Type the seeded credentials. hideKeyboard between because the
#    seeded email is long enough to push the password input below
#    the keyboard fold on S10.
- tapOn:
    id: "auth-sheet-email-input"
- inputText: ${output.signupEmail.email}
- hideKeyboard
- tapOn:
    id: "auth-sheet-password-input"
- inputText: ${output.signupEmail.password}
- hideKeyboard

# 8. Tap Continue → signIn fails (no account yet) → JIT alert.
- tapOn:
    id: "auth-sheet-sign-in-cta"
- waitForAnimationToEnd:
    timeout: 4000

# 9. The "Couldn't sign you in" alert must show with both action labels
#    visible (Try again + Create new account). Asserting the alert
#    title + the two button labels.
- assertVisible: "Couldn't sign you in"
- assertVisible: "Try again"
- assertVisible: "Create new account"

# 10. Tap "Create new account" → runSignUp fires.
- tapOn: "Create new account"
- waitForAnimationToEnd:
    timeout: 8000

# 11. The sheet must transition into the sentBox panel — proves
#     signUp succeeded with confirmation-pending AND the sheet stayed
#     mounted (so the relay subscription is alive).
- assertVisible:
    id: "auth-sheet-sent-box"
- assertVisible: "Check your email"

# 12. Verify the user actually exists in Supabase auth (proves signUp
#     wasn't a no-op).
- runScript: ../../helpers/verify_signup_user_exists.js

# 13. Cleanup — delete the created auth user so the email is reusable.
- runScript: ../../helpers/cleanup_signup_email.js
